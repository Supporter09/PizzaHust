name: pizzahust

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pizzahust
      MYSQL_USER: pizza
      MYSQL_PASSWORD: pizza
    ports:
      - "${MYSQL_HOST_PORT:-33306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  delivery-mock:
    build:
      context: ./delivery_mock
    restart: unless-stopped
    environment:
      # Must match the backend's secret (same env source) or webhook HMACs fail.
      DELIVERY_WEBHOOK_SECRET: ${DELIVERY_WEBHOOK_SECRET:?set DELIVERY_WEBHOOK_SECRET in .env}
      BACKEND_BASE_URL: http://backend:8000
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:9000/healthz', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      delivery-mock:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://pizza:pizza@mysql:3306/pizzahust
      # Secrets come from .env (init.sh creates it from .env.example) — never
      # hardcode them here so each environment supplies its own.
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      ADMIN_SEED_PHONE: "0900000001"
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:?set ADMIN_SEED_PASSWORD in .env}
      KITCHEN_SEED_PHONE: "0900000002"
      KITCHEN_SEED_PASSWORD: ${KITCHEN_SEED_PASSWORD:?set KITCHEN_SEED_PASSWORD in .env}
      DELIVERY_PROVIDER: mock
      DELIVERY_BASE_URL: http://delivery-mock:9000
      DELIVERY_API_KEY: ${DELIVERY_API_KEY:-dev-api-key}
      DELIVERY_WEBHOOK_SECRET: ${DELIVERY_WEBHOOK_SECRET:?set DELIVERY_WEBHOOK_SECRET in .env}
      DELIVERY_FEE_VND: "22000"
      # Default 5/min/IP; local e2e runs >5 admin logins/min across parallel specs.
      AUTH_RATE_LIMIT_PER_MINUTE: ${AUTH_RATE_LIMIT_PER_MINUTE:-5}
      LOYALTY_ACCRUAL_RATE: "10000"
      LOYALTY_REDEEM_VALUE_VND: "1000"
      LOYALTY_MAX_REDEEM_PCT: "0.5"
      ORDER_PROMISED_TIME_DEFAULT_MIN: "45"
      IMAGE_UPLOAD_DIR: /data/images
      IMAGE_BASE_URL: /images
    volumes:
      - images_data:/data/images
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the browser bundle at build time; keep it in sync with the
        # runtime value below from the same env source.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"

volumes:
  mysql_data: {}
  images_data: {}
