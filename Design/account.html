<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzaHust — My Account</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  .acct-grid { display: grid; grid-template-columns: 1fr 360px; gap: 28px; align-items: start; }
  .profile { padding: 28px; }
  .profile .top { display: flex; align-items: center; gap: 18px; justify-content: space-between; }
  .profile .who { display: flex; align-items: center; gap: 18px; }
  .avatar { width: 72px; height: 72px; border-radius: var(--pill); background: var(--brand-50); color: var(--brand-600); display: flex; align-items: center; justify-content: center; flex: none; }
  .avatar svg { width: 34px; height: 34px; }
  .profile h2 { font-size: 24px; }
  .profile .role { color: var(--ink-400); font-size: 14.5px; }
  .contact { display: grid; gap: 13px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--line); }
  .contact .c { display: flex; align-items: center; gap: 12px; color: var(--ink-700); font-size: 15px; }
  .contact .c svg { width: 19px; height: 19px; color: var(--ink-400); flex: none; }
  .stat-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 28px; }
  .quick { padding: 24px; }
  .quick h3 { font-size: 19px; margin-bottom: 18px; }
  .quick-link { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1px solid var(--line); border-radius: var(--r); font-weight: 600; font-size: 15px; color: var(--ink-800); transition: all .15s ease; margin-bottom: 12px; }
  .quick-link:hover { border-color: var(--brand-300); background: var(--brand-50); color: var(--brand-700); }
  .quick-link svg { width: 20px; height: 20px; color: var(--brand-600); }
  .quick-link .arr { margin-left: auto; color: var(--ink-300); }
</style>
</head>
<body>
<div class="page" data-screen-label="My Account">
  <header id="nav"></header>
  <main class="page-body">
    <div class="container" style="padding-block:40px 80px">
      <h1 class="h1" style="margin-bottom:28px">My Account</h1>
      <div class="acct-grid">
        <div>
          <div class="card profile">
            <div class="top">
              <div class="who"><span class="avatar" id="i-user"></span><div><h2>John Doe</h2><div class="role">Pizza Lover · Member since Aug 2025</div></div></div>
              <a class="btn btn-outline btn-sm" href="edit-profile.html">Edit Profile</a>
            </div>
            <div class="contact">
              <div class="c"><span id="i-mail"></span> john.doe@example.com</div>
              <div class="c"><span id="i-phone"></span> (555) 123-4567</div>
              <div class="c"><span id="i-pin"></span> 123 Main Street, Apt 4B, New York, NY 10001</div>
            </div>
          </div>
          <div class="stat-pair">
            <div class="card minicard"><span class="ic" id="i-bag"></span><div><div class="muted" style="font-size:13.5px">Total Orders</div><div style="font-size:26px;font-weight:800;color:var(--ink-900)">24</div></div></div>
            <div class="card minicard"><span class="ic" id="i-award" style="background:var(--cream-50);color:var(--amber-600)"></span><div><div class="muted" style="font-size:13.5px">Loyalty Points</div><div style="font-size:26px;font-weight:800;color:var(--brand-600)">150</div></div></div>
          </div>
        </div>

        <div class="card quick">
          <h3>Quick Actions</h3>
          <a class="quick-link" href="order-history.html"><span id="i-pkg"></span> Order History <span class="arr" id="a1"></span></a>
          <a class="quick-link" href="loyalty.html"><span id="i-aw2"></span> Loyalty Points <span class="arr" id="a2"></span></a>
          <a class="btn btn-primary btn-block btn-lg" href="menu.html" style="margin-top:6px">Order Now</a>
        </div>
      </div>
    </div>
  </main>
  <footer id="footer"></footer>
</div>
<script src="assets/chrome.js"></script>
<script>
  mountNav('Account', { cart: 0, points: 150 });
  mountFooter();
  const S = (id,n,sw)=>{const e=document.getElementById(id);if(e)e.innerHTML=PH_ICON(n,sw);};
  S('i-user','user');S('i-mail','mail');S('i-phone','phone');S('i-pin','pin');
  S('i-bag','bag');S('i-award','award');S('i-pkg','package');S('i-aw2','award');
  S('a1','arrow',2);S('a2','arrow',2);
</script>
</body>
</html>
