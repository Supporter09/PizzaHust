<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzaHust — Loyalty Points</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  .lp-wrap { max-width: 860px; margin: 0 auto; padding-block: 36px 80px; }
  .balance { background: linear-gradient(135deg, var(--brand-600), var(--brand-800)); color: #fff; border-radius: var(--r-lg); padding: 30px 32px; position: relative; overflow: hidden; }
  .balance::before { content:''; position:absolute; right:-30px; top:-30px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,.08); }
  .balance .l { font-size: 14.5px; opacity: .9; }
  .balance .v { font-size: 56px; font-weight: 800; line-height: 1; margin: 6px 0 2px; }
  .balance .u { font-size: 15px; opacity: .9; }
  .balance .save { margin-top: 18px; background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.22); border-radius: var(--pill); padding: 8px 16px; display: inline-block; font-size: 14px; font-weight: 600; }
  .balance .medal { position: absolute; right: 30px; top: 28px; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,.16); display: flex; align-items: center; justify-content: center; }
  .balance .medal svg { width: 30px; height: 30px; color: #fff; }
  .how { background: var(--cream-50); border: 1px solid var(--cream-200); border-radius: var(--r-lg); padding: 26px 28px; margin: 24px 0; }
  .how .ttl { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; color: var(--ink-900); margin-bottom: 18px; }
  .how .ttl svg { width: 22px; height: 22px; color: var(--brand-600); }
  .how-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; }
  .how-grid h4 { font-size: 15px; margin-bottom: 6px; }
  .how-grid p { font-size: 13.5px; color: var(--ink-500); }
  .hist { padding: 26px 28px; }
  .hist .ttl { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .hist .ttl svg { width: 22px; height: 22px; color: var(--brand-600); }
  .hrow { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--line); }
  .hrow:last-child { border-bottom: none; }
  .hrow .n { font-weight: 600; font-size: 15px; color: var(--ink-900); }
  .hrow .d { font-size: 12.5px; color: var(--ink-400); margin-top: 2px; }
  .hrow .pts { font-weight: 700; font-size: 15px; }
  .pts.pos { color: var(--green-600); } .pts.neg { color: var(--brand-600); }
</style>
</head>
<body>
<div class="page" data-screen-label="Loyalty Points">
  <header id="nav"></header>
  <main class="page-body">
    <div class="container lp-wrap">
      <a class="back" href="account.html" style="display:inline-flex;margin-bottom:18px"><span id="i-back"></span> Back to Account</a>
      <h1 class="h1" style="margin-bottom:24px">Loyalty Points</h1>

      <div class="balance">
        <div class="medal" id="i-medal"></div>
        <div class="l">Your Balance</div>
        <div class="v">150</div>
        <div class="u">Points</div>
        <div class="save">= $15.00 in savings</div>
      </div>

      <div class="how">
        <div class="ttl"><span id="i-gift"></span> How Loyalty Points Work</div>
        <div class="how-grid">
          <div><h4>Earn Points</h4><p>Earn 1 point for every $1 spent on orders.</p></div>
          <div><h4>Redeem Points</h4><p>100 points = $10 off your order.</p></div>
          <div><h4>Special Bonuses</h4><p>Get bonus points on birthdays and special events.</p></div>
        </div>
      </div>

      <div class="card hist">
        <div class="ttl"><span id="i-trend"></span> Points History</div>
        <div id="hist"></div>
      </div>
    </div>
  </main>
  <footer id="footer"></footer>
</div>
<script src="assets/chrome.js"></script>
<script>
  mountNav('Account', { cart: 0, points: 150 });
  mountFooter();
  document.getElementById('i-back').innerHTML = PH_ICON('back', 2);
  document.getElementById('i-medal').innerHTML = PH_ICON('award');
  document.getElementById('i-gift').innerHTML = PH_ICON('gift');
  document.getElementById('i-trend').innerHTML = PH_ICON('trend');
  const hist = [
    ['Order #ORD1712345678','4/5/2026','+51','pos'],
    ['Order #ORD1712233445','4/2/2026','+25','pos'],
    ['Redeemed for discount','3/30/2026','−50','neg'],
    ['Order #ORD1711998877','3/28/2026','+32','pos'],
    ['Birthday bonus','3/20/2026','+100','pos'],
  ];
  document.getElementById('hist').innerHTML = hist.map(([n,d,p,c]) => `
    <div class="hrow"><div><div class="n">${n}</div><div class="d">${d}</div></div><div class="pts ${c}">${p} pts</div></div>`).join('');
</script>
</body>
</html>
