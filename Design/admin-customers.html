<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzaHust Admin — Customers</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  .toolbar { padding: 18px; margin-bottom: 22px; }
  .search { position: relative; }
  .search svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 19px; height: 19px; color: var(--ink-300); }
  .search input { width: 100%; padding: 12px 16px 12px 44px; border-radius: var(--pill); border: 1.5px solid var(--line-2); background: var(--bg); font-family: inherit; font-size: 14.5px; }
  .search input:focus { outline: none; border-color: var(--brand-400); background: var(--surface); }
  .contact-cell .c { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--ink-500); }
  .contact-cell .c + .c { margin-top: 4px; }
  .contact-cell svg { width: 15px; height: 15px; color: var(--ink-300); flex: none; }
  .pts-cell { display: inline-flex; align-items: center; gap: 7px; font-weight: 700; color: var(--ink-900); }
  .pts-cell svg { width: 17px; height: 17px; color: var(--amber-600); }
  .view-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: var(--r-sm); border: 1.5px solid var(--line-2); background: var(--surface); font-family: inherit; font-size: 13.5px; font-weight: 600; color: var(--ink-700); cursor: pointer; }
  .view-btn:hover { border-color: var(--brand-300); color: var(--brand-600); }
</style>
</head>
<body>
<div class="admin" data-screen-label="Admin Customers">
  <aside id="sidebar"></aside>
  <main class="admin-main">
    <div class="admin-head"><div><h1 class="h1">Customer Management</h1><p>View customer profiles and loyalty information.</p></div></div>

    <div class="card toolbar">
      <div class="search"><span id="i-search"></span><input type="text" placeholder="Search by name or email…"></div>
    </div>

    <div class="card" style="overflow:hidden">
      <table class="tbl">
        <thead><tr><th>Customer</th><th>Contact</th><th>Orders</th><th>Total Spent</th><th>Loyalty Points</th><th>Join Date</th><th style="text-align:right">Actions</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>
</div>
<script src="assets/chrome.js"></script>
<script>
  mountSidebar('Customers');
  document.getElementById('i-search').innerHTML = PH_ICON('search');
  const cust = [
    ['John Doe','john.doe@example.com','(555) 123-4567','24 orders','$847.50','150 pts','8/15/2025'],
    ['Jane Smith','jane.smith@example.com','(555) 234-5678','18 orders','$612.30','95 pts','9/22/2025'],
    ['Bob Johnson','bob.johnson@example.com','(555) 345-6789','32 orders','$1,204.80','220 pts','6/10/2025'],
    ['Alice Williams','alice.williams@example.com','(555) 456-7890','15 orders','$523.45','78 pts','10/5/2025'],
  ];
  document.getElementById('rows').innerHTML = cust.map(([n,em,ph,o,sp,pt,jd]) => `
    <tr>
      <td class="strong">${n}</td>
      <td class="contact-cell"><div class="c">${PH_ICON('mail',2)} ${em}</div><div class="c">${PH_ICON('phone',2)} ${ph}</div></td>
      <td>${o}</td>
      <td class="price tnum">${sp}</td>
      <td><span class="pts-cell">${PH_ICON('award',2)} ${pt}</span></td>
      <td class="muted">${jd}</td>
      <td style="text-align:right"><a class="view-btn" href="admin-customer-detail.html" style="text-decoration:none">View Details</a></td>
    </tr>`).join('');
</script>
</body>
</html>
